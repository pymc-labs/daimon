[project]
name = "daimon-core"
version = "0.1.0"
description = "Daimon CMA core library"
requires-python = ">=3.12"
license = "MIT"
authors = [{ name = "PyMC Labs" }]
dependencies = [
    "anthropic>=0.117",
    "cachetools>=7,<8",
    "croniter>=6.0,<7",
    "httpx>=0.27",
    "httpx-sse>=0.4",
    "sqlalchemy[asyncio]>=2.0",
    "asyncpg>=0.29",
    "alembic>=1.13",
    "pydantic>=2.8",
    "pydantic-settings>=2.5",
    "cryptography>=43",
    "pyyaml>=6.0",
    "sentry-sdk>=2.61",
    "structlog>=24.1",
    "tenacity>=9.0",
    "PyJWT>=2.8",
    "google-auth>=2,<3",
]

[project.urls]
Repository = "https://github.com/pymc-labs/daimon"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["daimon"]
