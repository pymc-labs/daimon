[project]
name = "daimon-adapter-cli"
version = "0.1.0"
description = "Daimon admin CLI"
requires-python = ">=3.12"
license = "MIT"
authors = [{ name = "PyMC Labs" }]
dependencies = [
    "daimon-core",
    "typer>=0.12",
    "rich>=13",
    "structlog>=24",
    "anthropic>=0.96",
    "sqlalchemy[asyncio]>=2",
    "asyncpg>=0.29",
    "pydantic>=2.7",
    "pydantic-settings>=2.4",
    "pyyaml>=6",
    "httpx>=0.27",
]

[project.scripts]
daimon = "daimon.adapters.cli.main:app"

[project.urls]
Repository = "https://github.com/pymc-labs/daimon"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["daimon"]
