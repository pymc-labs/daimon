[project]
name = "daimon-adapter-slack"
version = "0.1.0"
description = "Daimon Slack adapter"
requires-python = ">=3.12"
license = "MIT"
authors = [{ name = "PyMC Labs" }]
dependencies = [
    "daimon-core",
    "slack-sdk>=3.42,<4",
    "structlog>=24",
    "anthropic>=0.96",
    "sqlalchemy[asyncio]>=2",
    "asyncpg>=0.29",
    "pydantic>=2.7",
    "pydantic-settings>=2.4",
    "sentry-sdk>=2.61",
    "httpx>=0.27",
]

[project.urls]
Repository = "https://github.com/pymc-labs/daimon"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["daimon"]
