# Production compose for the notebook-host VM. Image + notebook public IP are
# supplied by the VM startup script as env vars. Secrets come from
# /etc/daimon/daimon.env.
services:
  notebook-host:
    image: ${NOTEBOOK_IMAGE}
    env_file: [/etc/daimon/daimon.env]
    environment:
      DAIMON_NOTEBOOK__HOST_PORT: "8001"
      DAIMON_NOTEBOOK__DATA_DIR: /data/notebooks
      DAIMON_NOTEBOOK__PUBLIC_HOST: ${NOTEBOOK_PUBLIC_IP}
      DAIMON_NOTEBOOK__PUBLIC_URL_BASE: http://${NOTEBOOK_PUBLIC_IP}:8001
      DAIMON_NOTEBOOK__SUBPROCESS_TTL_SECONDS: "86400"
    ports:
      - "8001:8001"
    volumes:
      - /data:/data
    restart: unless-stopped
