<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 424" font-family="ui-sans-serif, -apple-system, 'Segoe UI', Helvetica, Arial, sans-serif">
  <!-- plate -->
  <rect x="2" y="2" width="956" height="420" rx="26" fill="#F4EFE7" stroke="#E3DCCE" stroke-width="2"/>

  <!-- adapter pills -->
  <g font-size="15" font-weight="600" fill="#3D6076" text-anchor="middle">
    <rect x="52" y="56"  width="148" height="44" rx="22" fill="#FDFCF9" stroke="#3D6076" stroke-width="2"/>
    <text x="126" y="83">Discord</text>
    <rect x="52" y="118" width="148" height="44" rx="22" fill="#FDFCF9" stroke="#3D6076" stroke-width="2"/>
    <text x="126" y="145">Slack</text>
    <rect x="52" y="180" width="148" height="44" rx="22" fill="#FDFCF9" stroke="#3D6076" stroke-width="2"/>
    <text x="126" y="207">CLI</text>
    <rect x="52" y="242" width="148" height="44" rx="22" fill="#FDFCF9" stroke="#3D6076" stroke-width="2"/>
    <text x="126" y="269">MCP</text>
    <rect x="52" y="304" width="148" height="44" rx="22" fill="#FDFCF9" stroke="#3D6076" stroke-width="2"/>
    <text x="126" y="331">Scheduler</text>
  </g>
  <text x="126" y="40" font-size="12" fill="#8A8272" text-anchor="middle" letter-spacing="1.5">ADAPTERS</text>

  <!-- adapter -> core connectors -->
  <g stroke="#3D6076" stroke-width="2" fill="none" opacity="0.5">
    <path d="M200 78  C 256 78,  256 166, 306 168"/>
    <path d="M200 140 C 254 140, 254 186, 306 188"/>
    <path d="M200 202 C 256 202, 256 202, 306 202"/>
    <path d="M200 264 C 254 264, 254 218, 306 216"/>
    <path d="M200 326 C 256 326, 256 238, 306 236"/>
  </g>
  <g fill="#C9807B">
    <circle cx="306" cy="168" r="5"/>
    <circle cx="306" cy="188" r="5"/>
    <circle cx="306" cy="202" r="5"/>
    <circle cx="306" cy="216" r="5"/>
    <circle cx="306" cy="236" r="5"/>
  </g>

  <!-- core -->
  <rect x="306" y="122" width="278" height="160" rx="32" fill="#46708F"/>
  <text x="445" y="188" font-size="22" font-weight="700" fill="#FDFCF9" text-anchor="middle">daimon core</text>
  <text x="445" y="216" font-size="13" fill="#D8E2EA" text-anchor="middle">turn pipeline &#183; tenant-scoped stores</text>

  <!-- core -> externals -->
  <g stroke="#3D6076" stroke-width="2" fill="none" opacity="0.5">
    <path d="M584 172 C 634 172, 634 134, 682 134"/>
    <path d="M584 232 C 634 232, 634 292, 682 292"/>
  </g>
  <circle cx="682" cy="134" r="5" fill="#C9807B"/>
  <circle cx="682" cy="292" r="5" fill="#C9807B"/>

  <!-- Managed Agents -->
  <rect x="682" y="78" width="228" height="112" rx="24" fill="#FDFCF9" stroke="#C9807B" stroke-width="2.5"/>
  <text x="796" y="120" font-size="15" font-weight="700" fill="#2E3A42" text-anchor="middle">Anthropic Managed Agents</text>
  <text x="796" y="143" font-size="12.5" fill="#6B7A85" text-anchor="middle">agents &#183; sessions &#183; skills</text>
  <text x="796" y="163" font-size="12.5" fill="#C9807B" text-anchor="middle" font-style="italic">source of truth</text>

  <!-- Postgres -->
  <rect x="682" y="246" width="228" height="92" rx="24" fill="#FDFCF9" stroke="#3D6076" stroke-width="2"/>
  <text x="796" y="284" font-size="15" font-weight="700" fill="#2E3A42" text-anchor="middle">Postgres</text>
  <text x="796" y="307" font-size="12.5" fill="#6B7A85" text-anchor="middle">identity &#183; tenant_id isolation</text>
</svg>
