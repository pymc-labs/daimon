name: Bug report
description: Report a problem with daimon
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: What happened? What did you expect to happen instead?
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to reproduce
      description: Minimal steps that reliably trigger the issue.
      placeholder: |
        1. ...
        2. ...
        3. ...
    validations:
      required: true

  - type: textarea
    id: expected-actual
    attributes:
      label: Expected vs actual behavior
      description: What did you expect to happen, and what actually happened?
    validations:
      required: true

  - type: dropdown
    id: adapter-surface
    attributes:
      label: Adapter surface
      description: Which part of daimon does this affect?
      options:
        - Discord
        - Slack
        - MCP
        - CLI
        - Scheduler
        - Core
        - Other / not sure
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Version / commit
      description: The daimon version, tag, or commit SHA you're running.
      placeholder: e.g. v0.4.0 or commit abc1234
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Relevant logs
      description: >
        Paste any relevant logs or error output. IMPORTANT: redact API
        keys, bot tokens, and any other secrets before pasting — logs are
        public once submitted.
      render: shell
    validations:
      required: false
